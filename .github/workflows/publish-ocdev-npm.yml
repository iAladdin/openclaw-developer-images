name: Publish ocdev to npm

on:
  push:
    branches:
      - main
    tags:
      - "ocdev-v*"
    paths:
      - ".github/workflows/publish-ocdev-npm.yml"
      - "packages/**"
      - "scripts/verify-cli-pack.mjs"
      - "package.json"
      - "test/**"
  pull_request:
    paths:
      - ".github/workflows/publish-ocdev-npm.yml"
      - "packages/**"
      - "scripts/verify-cli-pack.mjs"
      - "package.json"
      - "test/**"
  workflow_dispatch:

concurrency:
  group: publish-ocdev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-cli:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run repository tests
        run: npm test

      - name: Verify packed CLI tarball
        run: npm run verify:cli-pack

  publish-npm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/ocdev-v')
    needs: verify-cli
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("./packages/cli/package.json", "utf8"));
          const expectedTag = `ocdev-v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Tag ${actualTag} does not match packages/cli/package.json version ${pkg.version}.`);
            console.error(`Expected tag: ${expectedTag}`);
            process.exit(1);
          }
          EOF

      - name: Publish openclaw-dev to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./packages/cli --access public --provenance
